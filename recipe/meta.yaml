{% set name = "ezdag" %}
{% set version = "0.5.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ezdag-{{ version }}.tar.gz
  sha256: 8981d5deea4cfaed5e6e458de1a6252b953286c39f44560bbadce2c5011734a9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - python-htcondor >=9

test:
  requires:
    - python {{ python_min }}
    - pip
    - graphviz
    - python-graphviz
    - pytest
    - pytest-cov
    - pytest-datadir
  commands:
    - pip check
    - pip show ezdag
    - pytest -ra --pyargs ezdag

about:
  home: https://git.ligo.org/olivia.godwin/ezdag
  doc_url: https://ezdag.readthedocs.io
  summary: high-level HTCondor DAG generation library
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - nothisisolivia
